version: "3.9"

services:

    ai4-papi-prod:
        image: "registry.cloud.ai4eosc.eu/ai4os/ai4-papi:prod"
        restart: always
        env_file:
            - papi.env
        volumes:
            - /home/ubuntu/nomad-certs/nomad-federated:/home/nomad-certs
            - /home/ubuntu/ai4-accounting:/home/ai4-accounting
        ports:
            - 8080:80


    ai4-papi-dev:
        image: "registry.cloud.ai4eosc.eu/ai4os/ai4-papi:dev"
        restart: always
        env_file:
            - papi.env
        volumes:
            - /home/ubuntu/nomad-certs/nomad-federated:/home/nomad-certs
            - /home/ubuntu/ai4-accounting:/home/ai4-accounting
        ports:
            - 8081:80
